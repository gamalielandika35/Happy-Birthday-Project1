<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title> 💖</title>
  <link rel="stylesheet" href="HappyBirthday/style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>


<div id="questionBox" class="center">
  <h1>Kamu ..... bukan? 😳</h1>
  <button id="yesBtn">Iya 💖</button>
  <button id="noBtn">Tidak 😝</button>
</div>

<div id="question2" class="hidden center">
  <h1>Serius ini ...... kan ? 😏</h1>
  <button id="yesBtn2">Iya 💕</button>
  <button id="noBtn2">Tidak 😝</button>
</div>


<div id="envelopePage" class="hidden center">
  <h1>🎉 Ini buat kamu 🎉</h1>

  <div class="envelope-wrapper" id="openEnvelope">
    

    <div class="envelope">
      <div class="back"></div>
      <div class="flap"></div>
      <div class="letter">
        <h2>🎂 Happy Birthday 💖</h2>
        <p>
          Hari ini hari spesialmu 🥰<br>
          Aku bersyukur bisa kenal kamu 💖<br>
          Semoga semua impianmu tercapai 🎉<br><br>
        </p>
        <img src="foto.jpg" class="photo">
      </div>
    </div>

  </div>
</div>

<script src="HappyBirthdayscript.js"></script>
</body>
</html>
